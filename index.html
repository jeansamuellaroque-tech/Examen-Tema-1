<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Canvas Organizado</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  min-height:100vh;
}
.card{
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}
canvas{
  background:white;
  border-radius:15px;
}
.titulo{
  font-weight:700;
  color:white;
}
</style>
</head>
<body>

<div class="container py-5">
  <h1 class="text-center titulo mb-4">Proyecto API Canvas 2D</h1>

  <div class="card p-4">
    <div class="row text-center">

      <!-- IZQUIERDA -->
      <div class="col-md-6">
        <h4>Dibujo por Programación</h4>
        <canvas id="canvas" width="500" height="400"></canvas>
        <button class="btn btn-primary mt-3 w-100" onclick="dibujarPaisaje()">
          Dibujar
        </button>
      </div>

      <!-- DERECHA -->
      <div class="col-md-6">
        <h4>Imagen Original</h4>
        <img src="https://i.imgur.com/8bKQX7P.png"
             class="img-fluid rounded"
             alt="Paisaje original">
      </div>

    </div>
  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
